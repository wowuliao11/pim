[graph]
all-features = true

[advisories]
# Transitive vulnerability from openidconnect -> rsa dependency.
# Cannot be fixed until openidconnect releases a version without rsa dep.
# TODO: Remove when upstream updates available.
ignore = [
  "RUSTSEC-2023-0071", # rsa: Marvin Attack timing sidechannel
]

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "OpenSSL",
  "Zlib",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index", "https://index.crates.io"]
allow-git = []
