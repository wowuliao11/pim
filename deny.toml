[graph]
all-features = true

[advisories]
# Transitive vulnerability from openidconnect -> rsa dependency.
# Cannot be fixed until openidconnect releases a version without rsa dep.
# TODO: Remove when upstream updates available.
ignore = [
  "RUSTSEC-2023-0071", # rsa: Marvin Attack timing sidechannel
]

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
# Duplicate versions in our dep graph are caused entirely by upstream transitive
# dependencies that pin different major/minor versions of shared crates (e.g.
# actix-web pulls older `socket2`/`h2` while reqwest/tonic pull newer ones;
# `windows-sys` appears at 4 versions across the graph). None of these are
# resolvable from our side without forking upstream crates, so we accept them
# rather than maintain a churn-prone skip list.
multiple-versions = "allow"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
