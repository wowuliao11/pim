# User Service Configuration Template
# Copy this to config.toml and customize for your environment

# ============================================================
# Common Configuration (shared across all services)
# ============================================================
# Application environment: dev, staging, prod, test
app_env = "dev"

# Log level: trace, debug, info, warn, error
log_level = "info"

# Optional: Database URL
# database_url = "postgres://user:password@localhost:5432/user_db"

# ============================================================
# Service-Specific Configuration
# ============================================================
host = "127.0.0.1"
port = 50051
metrics_port = 60051

# ============================================================
# Zitadel Management API Configuration
# ============================================================
# IMPORTANT: Replace these with your actual Zitadel credentials!
# Create a service account in Zitadel and generate a Personal Access Token (PAT).
zitadel_authority = "https://my-instance.zitadel.cloud"
zitadel_service_account_token = "your-service-account-pat"
