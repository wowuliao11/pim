# Local dev stack for PIM.
#
# Derived from Zitadel's official compose pack (zitadel/zitadel@v4.13.0,
# deploy/compose/docker-compose.yml) with the following deliberate deviations,
# all tracked in /plans/006-dev-bootstrap.md (D11, D12, D13, D15):
#
#   1. Login service removed (D11). We don't have a PIM frontend yet that
#      redirects through Zitadel's OIDC UI.
#   2. FirstInstance dispenses an admin PAT via bootstrap/steps.yaml (D12)
#      instead of JWT Profile keys. The PAT lands on the `zitadel-bootstrap`
#      volume at /zitadel/bootstrap/pim-admin.pat.
#   3. Masterkey is generated by `just dev-up` on first run and persisted to
#      .env.local (D13); this file references it via `${ZITADEL_MASTERKEY}`.
#   4. PIM services (`pim-api-gateway`, `pim-user-service`) live behind the
#      `app` profile so Phase 1 smoke-test can bring up just the IdP stack
#      (`podman compose up -d postgres zitadel-api`) before pim-bootstrap
#      has generated their config.toml files.
#   5. External domain is `pim.localhost` (D7), RFC 6761 loopback; no
#      /etc/hosts edit required.
#   6. Traefik dropped from the dev stack (D15). Rootless podman's socket is
#      owned by the VM user (UID 502) and Traefik's docker provider can't
#      read it from inside the container. zitadel-api publishes 8080 on the
#      host directly. When we grow a second HTTP service we'll revisit
#      (likely Caddy + static config, not Traefik + docker provider).
#   7. Stack targets podman compose (Linux/macOS); docker compose also works.

services:
  zitadel-api:
    image: ghcr.io/zitadel/zitadel:v4.13.0
    command:
      - start-from-init
      - --masterkey
      - ${ZITADEL_MASTERKEY:?set ZITADEL_MASTERKEY in .env.local, or run just dev-up to mint}
      - --tlsMode
      - disabled
      - --steps
      - /bootstrap/steps.yaml
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALDOMAIN: pim.localhost
      ZITADEL_EXTERNALPORT: 18080
      ZITADEL_EXTERNALSECURE: "false"
    ports:
      - "18080:8080"
    volumes:
      - ./bootstrap:/bootstrap:ro
      - zitadel-bootstrap:/zitadel/bootstrap
    networks:
      - zitadel
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17.2-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - zitadel

  # PIM services (Phase 3+ smoke test; not started by default).
  # Bring up with: `podman compose --profile app up -d`
  pim-api-gateway:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
    ports:
      - "18080:8080"
    volumes:
      - ./apps/api-gateway/config.toml:/app/config.toml:ro
      - ./zitadel-key.json:/app/zitadel-key.json:ro
    networks:
      - zitadel
    depends_on:
      - pim-user-service

  pim-user-service:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: user-service
    ports:
      - "50051:50051"
    env_file:
      - .env.local
    volumes:
      - ./apps/user-service/config.toml:/app/config.toml:ro
    networks:
      - zitadel

volumes:
  postgres-data:
  zitadel-bootstrap:

networks:
  zitadel:
    driver: bridge
