# Local dev stack for PIM.
#
# Derived from Zitadel's official compose pack (zitadel/zitadel@v4.13.0,
# deploy/compose/docker-compose.yml) with the following deliberate deviations,
# all tracked in the ADRs referenced below:
#
#   1. Login service removed. We don't have a PIM frontend yet that redirects
#      through Zitadel's OIDC UI.
#   2. FirstInstance dispenses an admin PAT via bootstrap/steps.yaml instead
#      of JWT Profile keys. The PAT lands on the `zitadel-bootstrap` volume
#      at /zitadel/bootstrap/pim-admin.pat. See ADR-0005 and ADR-0013.
#   3. Masterkey is generated by `just dev-up` on first run and persisted to
#      .env.local (ADR-0012 Layer C); this file references it via
#      `${ZITADEL_MASTERKEY}`.
#   4. PIM services (`pim-api-gateway`, `pim-user-service`) live behind the
#      `app` profile so early smoke-tests can bring up just the IdP stack
#      (`podman compose up -d postgres zitadel-api`) before pim-bootstrap
#      has generated their config.toml files.
#   5. External domain is `pim.localhost` (RFC 6761 loopback); no /etc/hosts
#      edit required.
#   6. Traefik dropped from the dev stack. Rootless podman's socket is owned
#      by the VM user (UID 502) and Traefik's docker provider can't read it
#      from inside the container. zitadel-api publishes 8080 on the host
#      directly. When we grow a second HTTP service we'll revisit (likely
#      Caddy + static config, not Traefik + docker provider).
#   7. Stack targets podman compose (Linux/macOS); docker compose also works.
#
# Governing ADRs:
#   docs/decisions/0005-bootstrap-local-zitadel-with-pim-bootstrap-tool.md
#   docs/decisions/0012-three-layer-config-split-by-sensitivity.md
#   docs/decisions/0013-dev-prod-parity-via-declarative-bootstrap.md
#   docs/decisions/0015-allocate-service-ports-with-fixed-policy.md

services:
  zitadel-api:
    image: ghcr.io/zitadel/zitadel:v4.13.0
    command:
      - start-from-init
      - --masterkey
      - ${ZITADEL_MASTERKEY:?set ZITADEL_MASTERKEY in .env.local, or run just dev-up to mint}
      - --tlsMode
      - disabled
      - --steps
      - /bootstrap/steps.yaml
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALDOMAIN: pim.localhost
      ZITADEL_EXTERNALPORT: 18080
      ZITADEL_EXTERNALSECURE: "false"
    ports:
      - "18080:8080"
    volumes:
      - ./bootstrap:/bootstrap:ro
      - zitadel-bootstrap:/zitadel/bootstrap
    networks:
      - zitadel
    healthcheck:
      # The zitadel image is distroless (no shell, curl, or wget). Its own
      # binary ships a `ready` subcommand that hits /debug/ready over the
      # configured scheme/port. Source:
      #   github.com/zitadel/zitadel/blob/v4.13.0/cmd/ready/ready.go
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17.2-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - zitadel

  # PIM services (Phase 3+ smoke test; not started by default).
  # Bring up with: `podman compose --profile app up -d`
  #
  # Port policy: see ADR-0015.
  #   - api-gateway publishes 18000 on the host (Zitadel owns 18080).
  #   - user-service is NOT published to the host; the gateway reaches it
  #     over the compose network at pim-user-service:50051.
  pim-api-gateway:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
    ports:
      - "18000:8080"
    environment:
      # Override the 127.0.0.1 default baked into the gateway binary so it
      # targets user-service via compose-network DNS instead of localhost.
      APP__APP__USER_SERVICE_URL: "http://pim-user-service:50051"
    volumes:
      - ./apps/api-gateway/config.toml:/app/config.toml:ro
      - ./zitadel-key.json:/app/zitadel-key.json:ro
    networks:
      - zitadel
    depends_on:
      pim-user-service:
        condition: service_started
      zitadel-api:
        condition: service_healthy

  pim-user-service:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: user-service
    # No host publish (ADR-0015). Reachable on the compose network as
    # pim-user-service:50051.
    env_file:
      - .env.local
    volumes:
      - ./apps/user-service/config.toml:/app/config.toml:ro
    networks:
      - zitadel
    depends_on:
      zitadel-api:
        condition: service_healthy

volumes:
  postgres-data:
  zitadel-bootstrap:

networks:
  zitadel:
    driver: bridge
