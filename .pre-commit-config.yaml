# See https://pre-commit.com for more information
# Install: pre-commit install
# Run manually: pre-commit run --all-files

minimum_pre_commit_version: "2.20.0"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt (format)
        entry: cargo fmt --all
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: taplo-fmt
        name: taplo fmt (TOML format)
        entry: taplo fmt
        language: system
        files: \.toml$
        pass_filenames: false
        stages: [pre-commit]

      - id: cargo-clippy
        name: cargo clippy (lint)
        entry: cargo clippy --workspace --all-targets --all-features -- -D warnings
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: buf-lint
        name: buf lint (proto)
        entry: buf lint
        language: system
        files: \.proto$
        pass_filenames: false
        stages: [pre-commit]

      - id: buf-format
        name: buf format (proto)
        entry: buf format --diff --exit-code
        language: system
        files: \.proto$
        pass_filenames: false
        stages: [pre-commit]
